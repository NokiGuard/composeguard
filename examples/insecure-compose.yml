# A homelab stack where every service has at least one issue.
# Run: composeguard examples/insecure-compose.yml

services:
  # Reverse proxy: unpinned image, sensitive host mount, ports on 0.0.0.0.
  proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc:/etc:ro

  # Container manager (Portainer-style): privileged + docker socket.
  manager:
    image: portainer/portainer-ce
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9000:9000"

  # Monitoring agent that wanted host namespaces and SYS_ADMIN.
  monitor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    network_mode: host
    pid: host
    ipc: host
    cap_add:
      - SYS_ADMIN

  # Database with secrets pasted directly into env.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: hunter2
      API_KEY: sk_live_REDACTED_example_only
    ports:
      - "5432:5432"
