name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege defaults; jobs grant more only if needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # TODO: pin third-party actions to commit SHA (dependabot will offer PRs).
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest + coverage)
        run: uv run pytest

      - name: SAST (bandit)
        run: uv run bandit -r src -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit --strict --disable-pip
